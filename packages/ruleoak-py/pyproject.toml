[project]
name = "ruleoak-py"
version = "1.0.0"
description = "Python bridge for RuleOak Evidence JSONL v1, manifests, and local flight recording."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "AGPL-3.0-or-later; schemas and fixtures may be MIT where marked" }
authors = [{ name = "Stanley Sun", email = "stanleysunsg@gmail.com" }]
keywords = ["ruleoak", "ai-agents", "evidence-jsonl", "flight-recorder", "agent-firewall"]

[project.scripts]
ruleoak-py = "ruleoak_py.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
