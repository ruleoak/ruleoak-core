apiVersion: skill/v1.0
id: hello-brief
name: Hello Brief
version: 1.0.0
description: Minimal example skill — drafts a short brief from approved memory.
category: example
approvalLevel: review_before_export
inputs:
  - { name: topic, type: string, description: What to brief on, required: true }
outputs:
  - { name: brief, type: text, description: A short draft brief, required: true }
tools: []
modelTier:
  default: L0
  allowEscalation: false
memory:
  read:
    - { scope: workspace }
  write: []
dataBoundary:
  requirement: local_only
  stripAttachments: true
  pseudonymizeClients: true
promptFile: prompt.md
