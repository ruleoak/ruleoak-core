apiVersion: retrieval/v1.0
id: basic
version: 1.0.0
description: Minimal example retrieval recipe — approved memory, cited, local-only.
skillId: hello-brief
boundary: local_only
sources:
  - type: approved_memory
    queryFromUserTask: true
chunking:
  maxTokens: 512
  overlapTokens: 64
  splitOn: [heading, paragraph]
filters:
  workspaceRequired: true
  projectRequired: false
  approvedOnly: true
metadataFilters: []
topK: 6
contextPack:
  maxTokens: 4000
  sections:
    - source_excerpts
    - unknowns
citationRequired: true
unsupportedClaimPolicy: mark_unknown
