# Example domain pack (open-core). The smallest valid pack: one skill + one
# retrieval recipe. Copy this as the starting point for a new vertical.
apiVersion: domain-pack/v1.0
id: example-basic
name: Example Basic Pack
version: 1.0.0
description: Minimal example domain pack for the open core.
runtimeCompat:
  minCoreVersion: 1.0.0
  contracts:
    - skill/v1.0
    - retrieval/v1.0
skills:
  - skills/hello
retrievalRecipes:
  - retrieval-recipes/basic.yaml
uiLabels:
  app.title: Example Basic
  workspace.singular: Workspace
