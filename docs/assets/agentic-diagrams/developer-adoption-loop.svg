<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-label="RuleOak developer adoption loop">
  <rect width="980" height="260" rx="20" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial" font-size="26" font-weight="700" fill="#111827">Developer adoption loop</text>
  <g font-family="Arial" font-size="16" fill="#111827">
    <g transform="translate(40 90)"><rect width="120" height="70" rx="14" fill="#e0f2fe" stroke="#0369a1"/><text x="60" y="42" text-anchor="middle">Install</text></g>
    <g transform="translate(180 90)"><rect width="120" height="70" rx="14" fill="#e0f2fe" stroke="#0369a1"/><text x="60" y="42" text-anchor="middle">Configure</text></g>
    <g transform="translate(320 90)"><rect width="120" height="70" rx="14" fill="#dcfce7" stroke="#15803d"/><text x="60" y="42" text-anchor="middle">Run demo</text></g>
    <g transform="translate(460 90)"><rect width="120" height="70" rx="14" fill="#fef3c7" stroke="#b45309"/><text x="60" y="34" text-anchor="middle">Record</text><text x="60" y="54" text-anchor="middle">evidence</text></g>
    <g transform="translate(600 90)"><rect width="120" height="70" rx="14" fill="#ede9fe" stroke="#6d28d9"/><text x="60" y="42" text-anchor="middle">Replay</text></g>
    <g transform="translate(740 90)"><rect width="120" height="70" rx="14" fill="#fee2e2" stroke="#b91c1c"/><text x="60" y="42" text-anchor="middle">Badge + CI</text></g>
  </g>
  <g stroke="#64748b" stroke-width="2" marker-end="url(#arrow)">
    <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
    <line x1="160" y1="125" x2="180" y2="125"/><line x1="300" y1="125" x2="320" y2="125"/><line x1="440" y1="125" x2="460" y2="125"/><line x1="580" y1="125" x2="600" y2="125"/><line x1="720" y1="125" x2="740" y2="125"/>
  </g>
  <text x="40" y="218" font-family="Arial" font-size="15" fill="#475569">Goal: make integration obvious, useful, replayable, and visible in a README badge.</text>
</svg>
