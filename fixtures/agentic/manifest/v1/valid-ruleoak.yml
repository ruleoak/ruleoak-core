version: ruleoak.manifest.v1
project:
  name: ruleoak-conformance-agent
agent:
  name: fixture-agent
  runtime: generic
permissions:
  allowedActions:
    - search.read
  approvalRequired:
    - email.send
  blockedActions:
    - filesystem.delete
    - shell.execute
evidence:
  enabled: true
  format: jsonl
  replayable: true
redaction:
  enabled: true
policyPacks:
  - personal-assistant
