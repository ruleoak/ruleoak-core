name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: List examples
        run: npm run examples:list

      - name: Run sandbox demo
        run: npm run sandbox:demo
          npm run demo

      - name: Run example and sandbox tests
        run: npm test

      - name: Run local LLM doctor without requiring Ollama
        run: npm run llm:doctor
